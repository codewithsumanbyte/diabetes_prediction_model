<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #74ABE2, #5563DE);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            background: #fff;
            padding: 25px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background: #5563DE;
            border: none;
        }
        .btn-primary:hover {
            background: #3944BC;
        }
        .result {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🩺 Diabetes Prediction</h2>
        <form action="/predict" method="post">
            <div class="mb-3">
                <label for="pregnancies" class="form-label">Pregnancies</label>
                <input type="number" class="form-control" name="pregnancies" required>
            </div>
            <div class="mb-3">
                <label for="glucose" class="form-label">Glucose Level</label>
                <input type="number" class="form-control" name="glucose" required>
            </div>
            <div class="mb-3">
                <label for="bloodpressure" class="form-label">Blood Pressure</label>
                <input type="number" class="form-control" name="bloodpressure" required>
            </div>
            <div class="mb-3">
                <label for="skinthickness" class="form-label">Skin Thickness</label>
                <input type="number" class="form-control" name="skinthickness" required>
            </div>
            <div class="mb-3">
                <label for="insulin" class="form-label">Insulin Level</label>
                <input type="number" class="form-control" name="insulin" required>
            </div>
            <div class="mb-3">
                <label for="bmi" class="form-label">BMI</label>
                <input type="number" step="0.1" class="form-control" name="bmi" required>
            </div>
            <div class="mb-3">
                <label for="dpf" class="form-label">Diabetes Pedigree Function</label>
                <input type="number" step="0.01" class="form-control" name="dpf" required>
            </div>
            <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input type="number" class="form-control" name="age" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
